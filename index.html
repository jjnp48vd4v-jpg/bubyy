<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Anita ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0b0510;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        /* --- 1. KANVAS MATRIX (BACKGROUND) --- */
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* --- 2. LAYER COUNTDOWN & TEKS AWAL --- */
        .overlay-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(11, 5, 16, 0.4);
        }

        #countdownText {
            font-size: 5rem; /* Disesuaikan agar teks panjang seperti BIRTHDAY tidak kepotong di HP */
            font-weight: bold;
            color: #ff4fa8;
            text-shadow: 0 0 20px #ff4fa8, 0 0 40px #ff4fa8;
            transition: all 0.3s ease;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- 3. KONTEN UTAMA (SETELAH COUNTDOWN) --- */
        .main-container {
            position: relative;
            z-index: 5;
            display: none; 
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        /* Maskot Beruang */
        .bear-container {
            text-align: center;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        .bear-gif {
            width: 150px;
            height: auto;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* --- 4. KARTU AMPLOP --- */
        .envelope-card {
            width: 180px;
            height: 230px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(255, 79, 168, 0.3);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
            border: 4px solid #ffb6da;
        }

        .envelope-card:hover {
            transform: scale(1.05);
        }

        .envelope-card.open {
            transform: scale(0) rotateY(180deg);
            opacity: 0;
            pointer-events: none;
        }

        .hands-icon {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .heart-btn {
            font-size: 2.5rem;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* --- 5. TAMPILAN POPUP FOTO & PESAN --- */
        .content-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            color: #333;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        .content-popup.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .photo-slide-container {
            position: relative;
            width: 100%;
            height: 220px;
            overflow: hidden;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        .photo-slide {
            display: flex;
            width: 200%; 
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }

        .slide-page {
            width: 50%;
            height: 100%;
            display: flex;
            gap: 10px;
            padding: 5px;
        }

        .slide-page img {
            width: 50%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #ff4fa8;
        }

        .love-letter {
            background: #fff0f6;
            border-radius: 12px;
            padding: 15px;
            font-size: 0.95rem;
            color: #4a4a4a;
            line-height: 1.5;
            border-left: 4px solid #ff4fa8;
            margin-bottom: 15px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-style: italic;
        }

        .next-btn {
            background: #ff4fa8;
            color: white;
            border: none;
            padding: 8px 25px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 79, 168, 0.3);
            transition: background 0.2s;
        }

        .next-btn:hover {
            background: #e03b91;
        }

        /* --- 6. ANIMASI BENTUK HATI (AKHIR) --- */
        .heart-shape-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 30;
        }

        .heart-photo {
            position: absolute;
            width: 65px;
            height: 65px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            opacity: 0;
            transform: translate(-50%, -50%) scale(0);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .heart-photo.fly {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <div class="overlay-screen" id="overlayScreen">
        <div id="countdownText">3</div>
    </div>

    <div class="main-container" id="mainContainer">
        <div class="bear-container">
            <img src="https://media.tenor.com/79bfe9fV6gUAAAAi/cute-bear.gif" alt="Happy Birthday" class="bear-gif">
        </div>

        <div class="envelope-card" id="envelopeCard" onclick="openEnvelope()">
            <div class="hands-icon">👐</div>
            <div class="heart-btn">❤️</div>
        </div>
    </div>

    <div class="content-popup" id="contentPopup">
        <div class="photo-slide-container">
            <div class="photo-slide" id="photoSlide">
                <div class="slide-page">
                    <img src="https://picsum.photos/200/300?random=1" alt="Foto 1">
                    <img src="https://picsum.photos/200/300?random=2" alt="Foto 2">
                </div>
                <div class="slide-page">
                    <img src="https://picsum.photos/200/300?random=3" alt="Foto 3">
                    <img src="https://picsum.photos/200/300?random=4" alt="Foto 4">
                </div>
            </div>
        </div>
        
        <div class="love-letter" id="loveLetter">
            Happy Birthday Sayang 💕
        </div>

        <button class="next-btn" id="nextBtn" onclick="nextSlide()">Next</button>
    </div>

    <div class="heart-shape-container" id="heartShapeContainer"></div>

    <!-- Gunakan file video/audio lokal atau tautan eksternal yang valid -->
    <audio id="backsound" src="RPReplay_Final1780276651.mp4" loop></audio>

    <script>
        /* ===================================================
           1. LOGIKA BACKGROUND ANIMASI MATRIX (WARNA PINK)
           =================================================== */
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const katakana = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789' + 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
        const alphabet = katakana.split('');
        const fontSize = 16;
        let columns = canvas.width / fontSize;
        let rainDrops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(11, 5, 16, 0.05)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff4fa8'; 
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 30);

        /* ===================================================
           2. LOGIKA HITUNG MUNDUR (OTOMATIS TANPA STUCK)
           =================================================== */
        const overlay = document.getElementById('overlayScreen');
        const countText = document.getElementById('countdownText');
        const mainContainer = document.getElementById('mainContainer');
        const audio = document.getElementById('backsound');

        const introSequence = ['3', '2', '1', 'HAPPY', 'BIRTHDAY', 'TO', 'ANITA', '❤️'];
        let seqIndex = 0;

        // Fungsi ini langsung jalan otomatis begitu website dimuat di browser
        window.onload = function() {
            runIntro();
        };

        function runIntro() {
            if (seqIndex < introSequence.length) {
                countText.style.transform = "scale(0.5)";
                countText.style.opacity = "0";
                
                setTimeout(() => {
                    countText.innerText = introSequence[seqIndex];
                    countText.style.transform = "scale(1)";
                    countText.style.opacity = "1";
                    // Perkecil ukuran font khusus untuk teks yang panjang agar rapi di HP
                    if(introSequence[seqIndex].length > 3) {
                        countText.style.fontSize = "3.5rem";
                    } else {
                        countText.style.fontSize = "6rem";
                    }
                    seqIndex++;
                    setTimeout(runIntro, 1000); 
                }, 100);
            } else {
                // Selesai hitung mundur, hilangkan layar hitam pelan-pelan
                overlay.style.transition = 'opacity 0.8s';
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    mainContainer.style.display = 'flex'; // Munculkan amplop kado
                }, 800);
            }
        }

        /* ===================================================
           3. LOGIKA POPUP SURAT & MUSIK (MENYALA SAAT DIKLIK)
           =================================================== */
        const envelope = document.getElementById('envelopeCard');
        const popup = document.getElementById('contentPopup');
        const photoSlide = document.getElementById('photoSlide');
        const loveLetter = document.getElementById('loveLetter');

        let currentStep = 1;

        function openEnvelope() {
            // Putar audio di sini (Lolos proteksi browser karena dipicu oleh klik user pada amplop)
            audio.play().catch(err => console.log("Audio gagal berputar:", err));
            
            envelope.classList.add('open');
            setTimeout(() => {
                popup.classList.add('show');
            }, 600);
        }

        function nextSlide() {
            if (currentStep === 1) {
                photoSlide.style.transform = 'translateX(-50%)';
                loveLetter.innerText = "As long as you're smiling, I'm happy. Stay happy, my love ✨";
                currentStep = 2;
            } else if (currentStep === 2) {
                popup.classList.remove('show');
                setTimeout(() => {
                    createHeartExplosion();
                }, 500);
                currentStep = 3;
            }
        }

        /* ===================================================
           4. LOGIKA ANIMASI KUMPULAN FOTO MEMBENTUK HATI
           =================================================== */
        const heartContainer = document.getElementById('heartShapeContainer');

        const heartPhotosData = [
            "https://picsum.photos/100/100?random=11", "https://picsum.photos/100/100?random=12",
            "https://picsum.photos/100/100?random=13", "https://picsum.photos/100/100?random=14",
            "https://picsum.photos/100/100?random=15", "https://picsum.photos/100/100?random=16",
            "https://picsum.photos/100/100?random=17", "https://picsum.photos/100/100?random=18",
            "https://picsum.photos/100/100?random=19", "https://picsum.photos/100/100?random=20",
            "https://picsum.photos/100/100?random=21", "https://picsum.photos/100/100?random=22",
            "https://picsum.photos/100/100?random=23", "https://picsum.photos/100/100?random=24",
            "https://picsum.photos/100/100?random=25", "https://picsum.photos/100/100?random=26"
        ];

        function getHeartPoint(t, scale) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            return { x: x * scale, y: -y * scale };
        }

        function createHeartExplosion() {
            const totalPhotos = heartPhotosData.length;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const scale = window.innerWidth < 500 ? 8 : 13; 

            for (let i = 0; i < totalPhotos; i++) {
                const t = (i / totalPhotos) * 2 * Math.PI;
                const point = getHeartPoint(t, scale);

                const img = document.createElement('img');
                img.src = heartPhotosData[i];
                img.classList.add('heart-photo');
                
                img.style.left = centerX + 'px';
                img.style.top = centerY + 'px';
                
                heartContainer.appendChild(img);

                setTimeout(() => {
                    img.classList.add('fly');
                    img.style.left = (centerX + point.x) + 'px';
                    img.style.top = (centerY + point.y) + 'px';
                    img.style.transform = `translate(-50%, -50%) rotate(${(Math.random() * 20) - 10}deg)`;
                }, i * 150); 
            }
        }
    </script>
</body>
</html>
